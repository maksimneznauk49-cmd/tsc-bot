name: TSC Bot

on:
  schedule:
    - cron: "*/5 * * * *"  # перевірка кожні 5 хвилин
  workflow_dispatch:        # можна запускати вручну

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests
      - name: Run bot
        run: python bot.py
