name: TSC Bot

on:
  schedule:
    - cron: '*/5 * * * *'  # перевірка кожні 5 хвилин
  workflow_dispatch:  # дозволяє запускати вручну

jobs:
  check_tsc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install requests python-telegram-bot

      - name: Run bot
        run: python bot.py
