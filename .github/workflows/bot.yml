name: TSC Bot

on:
  schedule:
    - cron: '*/5 * * * *'  # перевірка кожні 5 хвилин
  workflow_dispatch:

jobs:
  check_tsc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.14'
      - run: pip install requests
      - run: python bot.py
